<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love You ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
  });

  const FONT_SIZE  = 18;
  const COL_WIDTH  = 90;
  const ROW_HEIGHT = 24;
  const TRAIL      = 18;
  const SPEED      = 40;
  const TEXTS      = ["rama sayang lia", "baby maafin aku", "loveu mollll"];
  const RGB        = "255,34,68";

  let cols, rows, drops, colText;

  function randText() {
    return TEXTS[Math.floor(Math.random() * TEXTS.length)];
  }

  function init() {
    cols = Math.ceil(W / COL_WIDTH) + 1;
    rows = Math.ceil(H / ROW_HEIGHT) + TRAIL;

    // Each column gets multiple independent streams
    drops   = [];
    colText = [];
    for (let i = 0; i < cols; i++) {
      // 2 streams per column offset apart
      drops.push(Math.floor(Math.random() * rows));
      drops.push(Math.floor(Math.random() * rows) - Math.floor(rows / 2));
      colText.push(randText());
      colText.push(randText());
    }
  }
  init();

  function drawStream(x, headY, word) {
    // Head
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    ctx.fillText(word, x, headY);
    // Trail
    for (let j = 1; j <= TRAIL; j++) {
      const alpha = Math.max(0, 1.0 - j * (1.0 / TRAIL));
      ctx.fillStyle = `rgba(${RGB},${alpha.toFixed(2)})`;
      ctx.fillText(word, x, headY - j * ROW_HEIGHT);
    }
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, W, H);
    ctx.font      = `bold ${FONT_SIZE}px 'Courier New', monospace`;
    ctx.textAlign = 'left';

    const total = drops.length;
    for (let i = 0; i < total; i++) {
      const col   = Math.floor(i / 2);
      const x     = col * COL_WIDTH + (i % 2) * (COL_WIDTH * 0.5);
      const headY = drops[i] * ROW_HEIGHT;

      drawStream(x, headY, colText[i]);

      if (headY > H + TRAIL * ROW_HEIGHT) {
        drops[i]   = -Math.floor(Math.random() * 8);
        colText[i] = randText();
      }
      drops[i]++;
    }
  }

  setInterval(draw, SPEED);
</script>
</body>
</html>
