<!DOCTYPE html>
<html>
<head>
    <title>I Love You</title>
    <style>
        body { background-color: black; color: pink; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        pre { font-size: 10px; line-height: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <pre id="heart"></pre>

    <script>
        const heartElement = document.getElementById('heart');
        const text = " i love u ";
        let index = 0;

        function drawHeart() {
            let output = "";
            for (let y = 1.5; y > -1.5; y -= 0.1) {
                for (let x = -1.5; x < 1.5; x += 0.05) {
                    // Formula matematika bentuk hati
                    if ((Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y) <= 0) {
                        output += text[index % text.length];
                        index++;
                    } else {
                        output += " ";
                    }
                }
                output += "\n";
            }
            heartElement.innerText = output;
        }

        drawHeart();
    </script>
</body>
</html>
